

services:
  # 1. BASE DE DATOS
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=elgranodeoro
    ports:
      - "5432:5432"

  # 2. BACKEND (API + IA)
  backend:
    build: ./backend
    #command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db/elgranodeoro

  # 3. FRONTEND (React) - ¡NUEVO!
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules # Truco para no borrar las librerías instaladas
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Necesario en Windows para que los cambios se vean al instante
    depends_on:
      - backend

volumes:
  postgres_data: